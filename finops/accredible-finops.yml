meters:
- name: unique_recipients
  description: Distinct recipients credentialed in the billing year - the primary cost driver.
  unit: recipients
  aggregation: sum
  dimensions:
  - account
  - department
  - group
- name: credentials_issued
  description: Certificates and badges issued. Unlimited per unique recipient; not directly billed.
  unit: credentials
  aggregation: sum
  dimensions:
  - account
  - group
  - design
- name: plan_subscription
  description: Annual plan fee for the selected tier (Launch, Connect, Growth, Enterprise).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track unique recipients per department and group against the plan's annual allowance.
- name: Allocation
  description: Use Departments and Groups to map credentialing spend to programs, teams, or cost centers.
- name: Optimization
  description: De-duplicate recipients so each person is counted once per year; right-size the plan tier to expected recipient volume; reuse Designs across Groups.
- name: Accountability
  description: Assign an owner per department; review recipient counts before annual renewal to confirm the tier still fits.
