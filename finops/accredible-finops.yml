description: >-
  FinOps view of Accredible spend. Accredible is a subscription SaaS billed on a
  per-unique-recipient basis over an annual commitment, not on API calls or
  per-credential usage - an issuer pays once per unique recipient per year and
  can issue unlimited certificates and badges to that recipient. The dominant
  cost driver is therefore the count of distinct recipients credentialed in a
  billing year, which maps to plan tier (Launch, Connect, Growth, Enterprise).
  The API is included in the subscription with no separate metered API charge.
notes: >-
  Per-tier and per-recipient rates above the Launch entry price are quote-based
  and not published; reconcile against an actual order form or invoice. Optimize
  by de-duplicating recipients (one person credentialed once per year rather than
  many overlapping records) and right-sizing the plan tier to expected annual
  recipient volume.
