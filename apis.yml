aid: accredible
url: https://raw.githubusercontent.com/api-evangelist/accredible/refs/heads/main/apis.yml
name: Accredible
kind: company
description: Accredible is a digital credentialing platform for issuing, managing,
  and verifying digital certificates and Open Badges. The REST API lets issuers
  create and update credentials (certificates and badges) for recipients, organize
  them into Groups (courses/achievements), apply reusable visual Designs, attach
  Evidence Items and References, generate PDFs and blockchain-verifiable records,
  pull engagement analytics, manage Departments and Team Members, and generate
  recipient SSO links. Credentials are issued against a Group and rendered with a
  Design; the platform hosts a public verification page and share links for each
  credential.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Digital Credentials
- Certificates
- Badges
