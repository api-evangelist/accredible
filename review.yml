aid: accredible
name: Accredible
review:
  question: Does Accredible expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Accredible's public developer surface is
    a request/response REST API over HTTPS (base https://api.accredible.com/v1,
    with a sandbox at https://sandbox.api.accredible.com/v1). Nothing in the
    published API reference describes a WebSocket (ws:// or wss://) endpoint,
    server-sent events, or any other server-push transport on Accredible's own
    API, so there is no realtime protocol surface to model.
findings:
  summary: |
    Accredible does not publish a documented public WebSocket API. Accredible is
    a digital credentialing platform for issuing, managing, and verifying
    digital certificates and Open Badges. Its public API is a pure
    request/response REST API over HTTPS at base https://api.accredible.com/v1
    (sandbox https://sandbox.api.accredible.com/v1), authenticated with an API
    key sent in the Authorization header using the scheme
    `Token token=YOUR_API_KEY`. Resources cover Credentials (create, bulk
    create, view, update, delete, search, PDF generation, blockchain
    verification, redirect, analytics), Groups, Designs (including embedded
    badge and certificate designer initialization), Evidence Items, References,
    Departments, Team Members, Analytics, Issuer details, and recipient SSO link
    generation. No realtime, bidirectional, or streaming WebSocket endpoint is
    documented anywhere in Accredible's API reference as of the review date.
  openSource: |
    Accredible is a proprietary, hosted SaaS platform; the credentialing engine
    is not open source. Accredible maintains a public GitHub organization
    (github.com/accredible) that has historically hosted its API documentation
    (the api-documentation repository, formerly published via Apiary), but the
    platform itself is closed source and consumed only as a managed service.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.accredible.com/v1
      documented: true
      note: Primary public API. Production base; sandbox at sandbox.api.accredible.com/v1. API-key auth via Authorization header.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Accredible's API reference as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No server-sent events surface is documented.
